<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>第五中隊職責查詢</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f6f4f">
<link rel="icon" type="image/png" href="icon-192.png?v=2">
<link rel="apple-touch-icon" href="icon-192.png?v=2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="中隊職責">
<link rel="stylesheet" href="style.css?v=22">
</head>
<body>
<div class="app">

  <div class="top-bar">
    <header class="header">
      <div class="header-title">
        <img src="icon-64.png?v=2" alt="" class="header-logo">
        <h1>第五中隊職責查詢</h1>
      </div>
      <div class="status-row">
        <span id="status-text" class="status-text">資料載入中…</span>
        <button id="refresh-btn" class="refresh-btn" title="重新整理">
          <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="me">我的職責</button>
      <button class="tab-btn" data-tab="overview">行程總覽</button>
      <button class="tab-btn" data-tab="tools">小工具</button>
    </nav>
  </div>

  <main class="content">

    <!-- Tab 1: 我的職責 -->
    <section id="tab-me" class="tab-panel active">
      <div class="picker-row">
        <label for="person-select">選擇人員：</label>
        <select id="person-select"></select>
      </div>
      <div id="me-content" class="day-list"></div>
    </section>

    <!-- Tab 2: 時段總覽 -->
    <section id="tab-overview" class="tab-panel">
      <div class="day-pills" id="day-pills"></div>
      <div id="overview-content" class="day-list"></div>
    </section>

    <!-- Tab 3: 小工具 -->
    <section id="tab-tools" class="tab-panel">

      <!-- 工具選單 -->
      <div id="tools-menu" class="tools-menu">
        <button class="tool-menu-card" data-tool="advisors">
          <span class="tool-menu-icon">🧑‍🏫</span>
          <span class="tool-menu-text">
            <span class="tool-menu-label">小隊輔一覽</span>
            <span class="tool-menu-desc">各中隊、小隊的隊輔名單與搜尋</span>
          </span>
          <span class="tool-menu-arrow">›</span>
        </button>
        <button class="tool-menu-card" data-tool="roster">
          <span class="tool-menu-icon">👥</span>
          <span class="tool-menu-text">
            <span class="tool-menu-label">小隊員一覽</span>
            <span class="tool-menu-desc">全 FSY 小隊員名單、資料與聰明搜尋</span>
          </span>
          <span class="tool-menu-arrow">›</span>
        </button>
        <button class="tool-menu-card" data-tool="contacts">
          <span class="tool-menu-icon">📞</span>
          <span class="tool-menu-text">
            <span class="tool-menu-label">領袖聯絡方式</span>
            <span class="tool-menu-desc">各 FSY 領袖的聯絡資訊</span>
          </span>
          <span class="tool-menu-arrow">›</span>
        </button>
        <button class="tool-menu-card" data-tool="rollcall">
          <span class="tool-menu-icon">✅</span>
          <span class="tool-menu-text">
            <span class="tool-menu-label">點名</span>
            <span class="tool-menu-desc">第五中隊各小隊勾選點名，可直接截圖回報</span>
          </span>
          <span class="tool-menu-arrow">›</span>
        </button>
        <button class="tool-menu-card" data-tool="draw">
          <span class="tool-menu-icon">🎲</span>
          <span class="tool-menu-text">
            <span class="tool-menu-label">隨機抽籤</span>
            <span class="tool-menu-desc">設定範圍與男女人數，從全 FSY 隨機抽出</span>
          </span>
          <span class="tool-menu-arrow">›</span>
        </button>
        <button class="tool-menu-card" data-tool="lyrics">
          <span class="tool-menu-icon">🎵</span>
          <span class="tool-menu-text">
            <span class="tool-menu-label">歌詞</span>
            <span class="tool-menu-desc">FSY 大會歌、前生</span>
          </span>
          <span class="tool-menu-arrow">›</span>
        </button>
        <button class="tool-menu-card" data-tool="map">
          <span class="tool-menu-icon">🗺️</span>
          <span class="tool-menu-text">
            <span class="tool-menu-label">校園地圖</span>
            <span class="tool-menu-desc">亞洲大學校園示意圖，點擊地點看說明</span>
          </span>
          <span class="tool-menu-arrow">›</span>
        </button>
      </div>

      <!-- 工具內容（點選後顯示，可返回選單） -->
      <div id="tool-view" class="tool-view" hidden>
        <button id="tool-back" class="tool-back">‹ 返回</button>

        <!-- 小隊員一覽 -->
        <div id="pane-roster" class="tool-pane" hidden>
          <div class="tool-head">
            <h2 class="tool-title">小隊員一覽</h2>
            <span class="tool-count" id="roster-count">載入中…</span>
          </div>
          <div class="roster-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="roster-search-icon" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input id="roster-input" type="text" placeholder="搜尋姓名、支會、小隊、隊輔…" autocomplete="off">
            <button id="roster-clear" class="roster-clear" aria-label="清除">✕</button>
          </div>
          <div class="filter-group">
            <div class="filter-label">中隊<span class="filter-hint">可複選</span></div>
            <div class="roster-filters" id="roster-team-filters"></div>
          </div>
          <div class="filter-group">
            <div class="filter-label">小隊<span class="filter-hint">可複選</span></div>
            <div class="roster-filters" id="roster-squad-filters"></div>
          </div>
          <div class="roster-toggles">
            <button class="roster-toggle" data-gender="all">全部</button>
            <button class="roster-toggle" data-gender="男">男</button>
            <button class="roster-toggle" data-gender="女">女</button>
            <button class="roster-toggle roster-toggle-early" id="roster-early-toggle">🕑 早退</button>
          </div>
          <div id="roster-list" class="roster-list"></div>
        </div>

        <!-- 隨機抽籤 -->
        <div id="pane-draw" class="tool-pane" hidden>
          <div class="tool-head"><h2 class="tool-title">隨機抽籤</h2></div>
          <p class="tool-hint">設定範圍與男女人數，從全 FSY 小隊員中隨機抽出（適合遊戲、點名、分組）。</p>
          <div class="filter-group">
            <div class="filter-label">範圍（中隊）<span class="filter-hint">可複選</span></div>
            <div class="roster-filters" id="draw-team-filters"></div>
          </div>
          <div class="filter-group">
            <div class="filter-label">範圍（小隊）<span class="filter-hint">可複選</span></div>
            <div class="roster-filters" id="draw-squad-filters"></div>
          </div>
          <div class="draw-counts">
            <div class="stepper-row">
              <span class="stepper-label male">男生</span>
              <div class="stepper" data-draw="male">
                <button class="stepper-btn" data-delta="-1" aria-label="減少">−</button>
                <span class="stepper-val" id="draw-male-val">1</span>
                <button class="stepper-btn" data-delta="1" aria-label="增加">＋</button>
              </div>
            </div>
            <div class="stepper-row">
              <span class="stepper-label female">女生</span>
              <div class="stepper" data-draw="female">
                <button class="stepper-btn" data-delta="-1" aria-label="減少">−</button>
                <span class="stepper-val" id="draw-female-val">0</span>
                <button class="stepper-btn" data-delta="1" aria-label="增加">＋</button>
              </div>
            </div>
          </div>
          <button id="random-pick-btn" class="random-btn">
            <span class="random-dice">🎲</span> 開始抽籤
          </button>
          <div id="random-result" class="random-result"></div>
        </div>

        <!-- 小隊輔一覽 -->
        <div id="pane-advisors" class="tool-pane" hidden>
          <div class="tool-head">
            <h2 class="tool-title">小隊輔一覽</h2>
            <span class="tool-count" id="advisor-count"></span>
          </div>
          <div class="roster-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="roster-search-icon" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input id="advisor-input" type="text" placeholder="搜尋隊輔姓名、中隊、小隊…" autocomplete="off">
            <button id="advisor-clear" class="roster-clear" aria-label="清除">✕</button>
          </div>
          <div class="filter-group">
            <div class="filter-label">中隊<span class="filter-hint">可複選</span></div>
            <div class="roster-filters" id="advisor-team-filters"></div>
          </div>
          <div id="advisor-list" class="roster-list"></div>
        </div>

        <!-- 領袖聯絡方式 -->
        <div id="pane-contacts" class="tool-pane" hidden>
          <div class="tool-head"><h2 class="tool-title">領袖聯絡方式</h2></div>
          <div id="contacts-body" class="contacts-body"></div>
        </div>

        <!-- 歌詞：歌曲列表 -->
        <div id="pane-lyrics" class="tool-pane" hidden>
          <div class="tool-head"><h2 class="tool-title">歌詞</h2></div>
          <div id="lyrics-body" class="lyrics-song-list"></div>
        </div>

        <!-- 歌詞：單首歌詞 -->
        <div id="pane-lyrics-song" class="tool-pane" hidden>
          <button id="lyrics-song-back" class="tool-back">‹ 返回</button>
          <div class="tool-head"><h2 class="tool-title" id="lyrics-song-title"></h2></div>
          <div id="lyrics-song-body" class="lyrics-body"></div>
        </div>

        <!-- 校園地圖 -->
        <div id="pane-map" class="tool-pane" hidden>
          <div class="tool-head"><h2 class="tool-title">校園地圖</h2></div>
          <p class="tool-hint">亞洲大學校園示意圖（非實際比例），依教學區／生活區／綜合區分區標示，點擊地點圖示查看名稱與簡介。</p>
          <svg id="campus-map" class="map-svg" viewBox="0 0 400 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="亞洲大學校園示意地圖">
            <rect class="map-bg" x="0" y="0" width="400" height="620" rx="16"></rect>

            <!-- 圖例 -->
            <g class="map-legend">
              <rect class="map-zone-bg-academic" x="20" y="10" width="14" height="14" rx="3"></rect>
              <text class="map-legend-label" x="38" y="21">教學區</text>
              <rect class="map-zone-bg-residential" x="150" y="10" width="14" height="14" rx="3"></rect>
              <text class="map-legend-label" x="168" y="21">生活區</text>
              <rect class="map-zone-bg-comprehensive" x="270" y="10" width="14" height="14" rx="3"></rect>
              <text class="map-legend-label" x="288" y="21">綜合區</text>
            </g>

            <circle class="map-tree" cx="35" cy="100" r="10"></circle>
            <circle class="map-tree" cx="35" cy="200" r="10"></circle>
            <circle class="map-tree" cx="35" cy="300" r="10"></circle>

            <!-- 區域背景 -->
            <rect class="map-zone-bg-academic" x="66" y="44" width="234" height="320" rx="14"></rect>
            <rect class="map-zone-bg-residential" x="308" y="44" width="84" height="560" rx="14"></rect>
            <rect class="map-zone-bg-comprehensive" x="8" y="372" width="292" height="224" rx="14"></rect>

            <!-- 教學區 -->
            <g class="map-location map-zone-academic" data-loc="med" tabindex="0" role="button" aria-label="醫學暨健康學院">
              <rect class="map-shape" x="74" y="54" width="96" height="64" rx="10"></rect>
              <text class="map-location-icon" x="122" y="76">🏥</text>
              <text class="map-location-label" x="122" y="96"><tspan x="122" dy="0">醫學暨健康</tspan><tspan x="122" dy="13">學院</tspan></text>
            </g>

            <g class="map-location map-zone-academic" data-loc="ice" tabindex="0" role="button" aria-label="資訊電機學院">
              <rect class="map-shape" x="196" y="54" width="96" height="64" rx="10"></rect>
              <text class="map-location-icon" x="244" y="76">💻</text>
              <text class="map-location-label" x="244" y="96"><tspan x="244" dy="0">資訊電機</tspan><tspan x="244" dy="13">學院</tspan></text>
            </g>

            <g class="map-location map-zone-academic" data-loc="design" tabindex="0" role="button" aria-label="創意設計學院">
              <rect class="map-shape" x="74" y="130" width="96" height="64" rx="10"></rect>
              <text class="map-location-icon" x="122" y="152">🎨</text>

            </g>

            <g class="map-location map-zone-academic" data-loc="intl" tabindex="0" role="button" aria-label="國際學院">

            <g class="map-location map-zone-academic" data-loc="management" tabindex="0" role="button" aria-label="管理學院">
              <rect class="map-shape" x="74" y="206" width="96" height="64" rx="10"></rect>
              <text class="map-location-icon" x="122" y="232">📊</text>

            </g>

            <g class="map-location map-zone-academic" data-loc="law" tabindex="0" role="button" aria-label="法律學院">

            </g>

            <g class="map-location map-zone-academic" data-loc="humanities" tabindex="0" role="button" aria-label="人文社會學院">

              <text class="map-location-icon" x="183" y="304">🏛️</text>
              <text class="map-location-label" x="183" y="324"><tspan x="183" dy="0">人文社會</tspan><tspan x="183" dy="13">學院</tspan></text>
            </g>

            <!-- 生活區 -->
            <g class="map-location map-zone-residential" data-loc="dorm1" tabindex="0" role="button" aria-label="D1 威恩學苑">

              <text class="map-location-label" x="350" y="90"><tspan x="350" dy="0">D1</tspan><tspan x="350" dy="13">威恩學苑</tspan></text>
            </g>

            <g class="map-location map-zone-residential" data-loc="dorm2" tabindex="0" role="button" aria-label="D2 惟德學苑">
              <rect class="map-shape" x="313" y="124" width="74" height="68" rx="10"></rect>
              <text class="map-location-icon" x="350" y="146">🛏️</text>
              <text class="map-location-label" x="350" y="166"><tspan x="350" dy="0">D2</tspan><tspan x="350" dy="13">惟德學苑</tspan></text>
            </g>

            <g class="map-location map-zone-residential" data-loc="dorm3" tabindex="0" role="button" aria-label="D3 登峰學苑">
              <rect class="map-shape" x="313" y="200" width="74" height="68" rx="10"></rect>
              <text class="map-location-icon" x="350" y="222">🛏️</text>
              <text class="map-location-label" x="350" y="242"><tspan x="350" dy="0">D3</tspan><tspan x="350" dy="13">登峰學苑</tspan></text>
            </g>

            <g class="map-location map-zone-residential" data-loc="dorm4" tabindex="0" role="button" aria-label="D4 築夢學苑">
              <rect class="map-shape" x="313" y="276" width="74" height="68" rx="10"></rect>
              <text class="map-location-icon" x="350" y="298">🛏️</text>
              <text class="map-location-label" x="350" y="318"><tspan x="350" dy="0">D4</tspan><tspan x="350" dy="13">築夢學苑</tspan></text>
            </g>

            <g class="map-location map-zone-residential" data-loc="seven" tabindex="0" role="button" aria-label="7-ELEVEN">

            </g>

            <g class="map-location map-zone-residential" data-loc="cafeteria" tabindex="0" role="button" aria-label="學生餐廳">
              <rect class="map-shape" x="313" y="428" width="74" height="68" rx="10"></rect>
              <text class="map-location-icon" x="350" y="454">🍽️</text>
              <text class="map-location-label" x="350" y="476">學生餐廳</text>
            </g>

            <g class="map-location map-zone-residential" data-loc="yahua" tabindex="0" role="button" aria-label="亞樺菲蘭餐廳">
              <rect class="map-shape" x="313" y="504" width="74" height="68" rx="10"></rect>
              <text class="map-location-icon" x="350" y="526">🍜</text>
              <text class="map-location-label" x="350" y="546"><tspan x="350" dy="0">亞樺菲蘭</tspan><tspan x="350" dy="13">餐廳</tspan></text>
            </g>

            <!-- 綜合區 -->
            <g class="map-location map-zone-comprehensive" data-loc="power" tabindex="0" role="button" aria-label="動力中心">
              <rect class="map-shape" x="11" y="376" width="90" height="64" rx="10"></rect>
              <text class="map-location-icon" x="56" y="402">⚡</text>
              <text class="map-location-label" x="56" y="424">動力中心</text>
            </g>

            <g class="map-location map-zone-comprehensive" data-loc="library" tabindex="0" role="button" aria-label="圖書館">
              <rect class="map-shape" x="109" y="376" width="90" height="64" rx="10"></rect>
              <text class="map-location-icon" x="154" y="402">📖</text>
              <text class="map-location-label" x="154" y="424">圖書館</text>
            </g>

            <g class="map-location map-zone-comprehensive" data-loc="taiji" tabindex="0" role="button" aria-label="太極湖（玫瑰花園）">

              <text class="map-location-label" x="252" y="418"><tspan x="252" dy="0">太極湖</tspan><tspan x="252" dy="13">(玫瑰花園)</tspan></text>
            </g>

            <g class="map-location map-zone-comprehensive" data-loc="admin" tabindex="0" role="button" aria-label="行政中心">
              <rect class="map-shape" x="11" y="452" width="90" height="64" rx="10"></rect>
              <text class="map-location-icon" x="56" y="478">🏢</text>
              <text class="map-location-label" x="56" y="500">行政中心</text>
            </g>

            <g class="map-location map-zone-comprehensive" data-loc="gym" tabindex="0" role="button" aria-label="體育館">
              <rect class="map-shape" x="109" y="452" width="90" height="64" rx="10"></rect>
              <text class="map-location-icon" x="154" y="478">🏀</text>
              <text class="map-location-label" x="154" y="500">體育館</text>
            </g>

            <g class="map-location map-zone-comprehensive" data-loc="lotus" tabindex="0" role="button" aria-label="荷花池">
              <rect class="map-shape" x="207" y="452" width="90" height="64" rx="10"></rect>
              <text class="map-location-icon" x="252" y="478">🪷</text>
              <text class="map-location-label" x="252" y="500">荷花池</text>
            </g>

            <g class="map-location map-zone-comprehensive" data-loc="museum" tabindex="0" role="button" aria-label="亞洲大學現代美術館">
              <rect class="map-shape" x="11" y="528" width="90" height="64" rx="10"></rect>
              <text class="map-location-icon" x="56" y="550">🖼️</text>
              <text class="map-location-label" x="56" y="570"><tspan x="56" dy="0">亞洲大學</tspan><tspan x="56" dy="13">現代美術館</tspan></text>
            </g>

            <g class="map-location map-zone-comprehensive" data-loc="clubhouse" tabindex="0" role="button" aria-label="休閒會館">
              <rect class="map-shape" x="109" y="528" width="90" height="64" rx="10"></rect>
              <text class="map-location-icon" x="154" y="554">☕</text>
              <text class="map-location-label" x="154" y="576">休閒會館</text>
            </g>
          </svg>
          <div id="map-info" class="map-info"></div>
        </div>

        <!-- 點名 -->
        <div id="pane-rollcall" class="tool-pane" hidden>
          <div class="tool-head">
            <h2 class="tool-title">點名</h2>
            <span class="tool-count" id="rollcall-count"></span>
          </div>
          <div class="filter-group">
            <div class="filter-label">選擇小隊</div>
            <div class="roster-filters" id="rollcall-squad-filters"></div>
          </div>
          <div id="rollcall-board" class="rollcall-board"></div>
          <div class="rollcall-actions">
            <button id="rollcall-all" class="rollcall-action-btn">全部到齊</button>
            <button id="rollcall-none" class="rollcall-action-btn">全部清除</button>
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- 搜尋（行程總覽）：置於 .app 之下、各分頁之外，避免分頁切換動畫的 transform 影響 fixed 定位 -->
  <button id="search-fab" class="search-fab" title="搜尋行程" aria-label="搜尋行程" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="search-fab-icon" aria-hidden="true">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
  </button>

  <div id="search-overlay" class="search-overlay">
    <div class="search-backdrop"></div>
    <div class="search-panel">
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="search-bar-icon" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="search-input" type="text" placeholder="搜尋行程、地點…" autocomplete="off">
        <button id="search-close" class="search-close" aria-label="關閉搜尋">✕</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <footer class="footer">
    資料來源：2026 FSY 第五中隊「職責」與「2026 細流」Google 試算表（即時同步）
  </footer>

</div>
