<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FSY 個人筆記</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f6f4f">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FSY筆記">
<link rel="stylesheet" href="style.css?v=1">
</head>
<body>
<div class="app">

  <div class="top-bar">
    <header class="header">
      <div class="header-title">
        <img src="icon-64.png" alt="" class="header-logo">
        <h1>FSY 個人筆記</h1>
      </div>
      <div class="status-row">
        <span class="status-text">每個時段寫下你要做的事 · 只存在這支手機，完全私密</span>
      </div>
    </header>

    <div class="daybar">
      <div class="day-pills" id="day-pills"></div>
    </div>
  </div>

  <main class="content">
    <section class="tab-panel active">
      <div id="notes-list" class="notes-list"></div>
      <button id="add-note" class="add-note-btn">＋ 新增筆記</button>
    </section>
  </main>

  <footer class="footer">
    你的筆記只儲存在這支裝置的瀏覽器裡，不會上傳、不會同步到別的手機。
  </footer>

</div>

<script src="app.js?v=1"></script>
</body>
</html>
